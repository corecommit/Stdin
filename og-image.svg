<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
    <clipPath id="card-clip">
      <rect x="60" y="60" width="500" height="310" rx="10"/>
    </clipPath>
    <clipPath id="term-clip">
      <rect x="60" y="390" width="500" height="120" rx="10"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0c0f15"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="#00e87a" opacity="0.9"/>

  <!-- ─── LEFT: Code editor card ─── -->
  <!-- Card background -->
  <rect x="60" y="60" width="500" height="450" rx="10" fill="#111520" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- Window chrome bar -->
  <rect x="60" y="60" width="500" height="44" rx="10" fill="#0e1219"/>
  <rect x="60" y="94" width="500" height="10" fill="#0e1219"/>

  <!-- Traffic dots -->
  <circle cx="94" cy="82" r="6" fill="#ff5f57"/>
  <circle cx="116" cy="82" r="6" fill="#febc2e"/>
  <circle cx="138" cy="82" r="6" fill="#28c840"/>

  <!-- Tab label -->
  <text x="168" y="87" font-size="12" fill="#ffffff" opacity="0.3" font-weight="400">solution.py</text>

  <!-- Line numbers + code -->
  <!-- Line 1 -->
  <text x="86" y="138" font-size="13" fill="#ffffff" opacity="0.2" font-weight="400">1</text>
  <text x="116" y="138" font-size="13" fill="#c792ea" font-weight="400">def</text>
  <text x="148" y="138" font-size="13" fill="#82aaff" font-weight="400">two_sum</text>
  <text x="234" y="138" font-size="13" fill="#ffffff" font-weight="400">(</text>
  <text x="244" y="138" font-size="13" fill="#ffcb6b" font-weight="400">nums</text>
  <text x="286" y="138" font-size="13" fill="#ffffff" font-weight="400">,</text>
  <text x="296" y="138" font-size="13" fill="#ffcb6b" font-weight="400"> target</text>
  <text x="352" y="138" font-size="13" fill="#ffffff" font-weight="400">):</text>

  <!-- Line 2 -->
  <text x="86" y="162" font-size="13" fill="#ffffff" opacity="0.2" font-weight="400">2</text>
  <text x="116" y="162" font-size="13" fill="#546e7a" font-weight="400" font-style="italic">    # track seen numbers</text>

  <!-- Line 3 -->
  <text x="86" y="186" font-size="13" fill="#ffffff" opacity="0.2" font-weight="400">3</text>
  <text x="116" y="186" font-size="13" fill="#ffffff" font-weight="400">    </text>
  <text x="148" y="186" font-size="13" fill="#82aaff" font-weight="400">seen</text>
  <text x="190" y="186" font-size="13" fill="#89ddff" font-weight="400"> =</text>
  <text x="210" y="186" font-size="13" fill="#ffffff" font-weight="400"> {}</text>

  <!-- Line 4 -->
  <text x="86" y="210" font-size="13" fill="#ffffff" opacity="0.2" font-weight="400">4</text>
  <text x="116" y="210" font-size="13" fill="#c792ea" font-weight="400">    for</text>
  <text x="156" y="210" font-size="13" fill="#ffcb6b" font-weight="400"> i</text>
  <text x="168" y="210" font-size="13" fill="#ffffff" font-weight="400">,</text>
  <text x="178" y="210" font-size="13" fill="#ffcb6b" font-weight="400"> n</text>
  <text x="190" y="210" font-size="13" fill="#c792ea" font-weight="400"> in</text>
  <text x="214" y="210" font-size="13" fill="#82aaff" font-weight="400"> enumerate</text>
  <text x="320" y="210" font-size="13" fill="#ffffff" font-weight="400">(</text>
  <text x="330" y="210" font-size="13" fill="#ffcb6b" font-weight="400">nums</text>
  <text x="372" y="210" font-size="13" fill="#ffffff" font-weight="400">):</text>

  <!-- Line 5 -->
  <text x="86" y="234" font-size="13" fill="#ffffff" opacity="0.2" font-weight="400">5</text>
  <text x="116" y="234" font-size="13" fill="#c792ea" font-weight="400">        if</text>
  <text x="166" y="234" font-size="13" fill="#ffcb6b" font-weight="400"> target</text>
  <text x="220" y="234" font-size="13" fill="#89ddff" font-weight="400"> -</text>
  <text x="234" y="234" font-size="13" fill="#ffcb6b" font-weight="400"> n</text>
  <text x="246" y="234" font-size="13" fill="#c792ea" font-weight="400"> in</text>
  <text x="268" y="234" font-size="13" fill="#82aaff" font-weight="400"> seen</text>
  <text x="308" y="234" font-size="13" fill="#ffffff" font-weight="400">:</text>

  <!-- Line 6 -->
  <text x="86" y="258" font-size="13" fill="#ffffff" opacity="0.2" font-weight="400">6</text>
  <text x="116" y="258" font-size="13" fill="#c792ea" font-weight="400">            return</text>
  <text x="238" y="258" font-size="13" fill="#ffffff" font-weight="400"> [</text>
  <text x="252" y="258" font-size="13" fill="#82aaff" font-weight="400">seen</text>
  <text x="292" y="258" font-size="13" fill="#ffffff" font-weight="400">[</text>
  <text x="300" y="258" font-size="13" fill="#ffcb6b" font-weight="400">target</text>
  <text x="354" y="258" font-size="13" fill="#89ddff" font-weight="400"> -</text>
  <text x="368" y="258" font-size="13" fill="#ffcb6b" font-weight="400"> n</text>
  <text x="380" y="258" font-size="13" fill="#ffffff" font-weight="400">],</text>
  <text x="400" y="258" font-size="13" fill="#f78c6c" font-weight="400"> i</text>
  <text x="412" y="258" font-size="13" fill="#ffffff" font-weight="400">]</text>

  <!-- Line 7 -->
  <text x="86" y="282" font-size="13" fill="#ffffff" opacity="0.2" font-weight="400">7</text>
  <text x="116" y="282" font-size="13" fill="#82aaff" font-weight="400">        seen</text>
  <text x="196" y="282" font-size="13" fill="#ffffff" font-weight="400">[</text>
  <text x="204" y="282" font-size="13" fill="#ffcb6b" font-weight="400">n</text>
  <text x="214" y="282" font-size="13" fill="#ffffff" font-weight="400">]</text>
  <text x="222" y="282" font-size="13" fill="#89ddff" font-weight="400"> =</text>
  <text x="240" y="282" font-size="13" fill="#ffcb6b" font-weight="400"> i</text>

  <!-- Line 8 — cursor -->
  <text x="86" y="306" font-size="13" fill="#ffffff" opacity="0.2" font-weight="400">8</text>
  <rect x="116" y="292" width="2" height="16" fill="#00e87a"/>

  <!-- Divider between editor and terminal -->
  <rect x="60" y="330" width="500" height="1" fill="#ffffff" opacity="0.06"/>

  <!-- Terminal section -->
  <rect x="60" y="330" width="500" height="180" rx="0" fill="#0a0d12"/>
  <rect x="60" y="490" width="500" height="20" rx="0" fill="#0a0d12"/>
  <rect x="60" y="490" width="500" height="20" rx="10" fill="#0a0d12"/>

  <!-- Terminal prompt line 1 -->
  <text x="86" y="366" font-size="12" fill="#00e87a" font-weight="700">$</text>
  <text x="102" y="366" font-size="12" fill="#ffffff" opacity="0.4" font-weight="400"> python solution.py</text>

  <!-- Terminal output -->
  <text x="86" y="394" font-size="12" fill="#ffffff" opacity="0.3" font-weight="400">Input: nums = [2,7,11,15], target = 9</text>

  <!-- Pass result -->
  <rect x="76" y="406" width="4" height="28" rx="2" fill="#00e87a"/>
  <text x="92" y="420" font-size="13" fill="#00e87a" font-weight="700">PASS</text>
  <text x="140" y="420" font-size="13" fill="#ffffff" opacity="0.5" font-weight="400">Output: [0, 1]</text>
  <text x="330" y="420" font-size="12" fill="#ffffff" opacity="0.25" font-weight="400">11ms</text>

  <text x="86" y="447" font-size="12" fill="#ffffff" opacity="0.2" font-weight="400">All 3 test cases passed</text>

  <!-- Solved badge -->
  <rect x="366" y="434" width="94" height="22" rx="11" fill="#00e87a" opacity="0.15"/>
  <rect x="366" y="434" width="94" height="22" rx="11" fill="none" stroke="#00e87a" stroke-width="0.8" opacity="0.5"/>
  <circle cx="380" cy="445" r="3" fill="#00e87a"/>
  <text x="390" y="449" font-size="10" fill="#00e87a" font-weight="700" letter-spacing="0.08em">SOLVED</text>

  <!-- ─── RIGHT: Brand block ─── -->

  <!-- Live badge -->
  <rect x="680" y="96" width="148" height="24" rx="12" fill="#00e87a" opacity="0.1"/>
  <rect x="680" y="96" width="148" height="24" rx="12" fill="none" stroke="#00e87a" stroke-width="0.8" opacity="0.4"/>
  <circle cx="695" cy="108" r="3.5" fill="#00e87a"/>
  <text x="706" y="112" font-size="10" fill="#00e87a" font-weight="700" letter-spacing="0.12em">PYTHON IN BROWSER</text>

  <!-- Wordmark: stdin -->
  <text x="678" y="232" font-size="120" fill="#ffffff" font-weight="800" letter-spacing="-5">std</text>
  <text x="894" y="232" font-size="120" fill="#00e87a" font-weight="800" letter-spacing="-5">in</text>

  <!-- Tagline -->
  <text x="680" y="274" font-size="16" fill="#ffffff" opacity="0.4" font-weight="400" letter-spacing="0.02em">285 Python challenges. No installs. Just code.</text>

  <!-- Thin divider -->
  <rect x="680" y="296" width="440" height="1" fill="#ffffff" opacity="0.07"/>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <text x="680" y="340" font-size="34" fill="#ffffff" font-weight="800" letter-spacing="-1">285</text>
  <text x="728" y="340" font-size="34" fill="#00e87a" font-weight="800">+</text>
  <text x="680" y="362" font-size="11" fill="#ffffff" opacity="0.3" font-weight="400" letter-spacing="0.1em">PROBLEMS</text>

  <!-- Stat divider -->
  <rect x="794" y="318" width="1" height="52" fill="#ffffff" opacity="0.1"/>

  <!-- Stat 2 -->
  <text x="816" y="340" font-size="34" fill="#ffffff" font-weight="800" letter-spacing="-1">4</text>
  <text x="816" y="362" font-size="11" fill="#ffffff" opacity="0.3" font-weight="400" letter-spacing="0.1em">DIFFICULTIES</text>

  <!-- Stat divider -->
  <rect x="940" y="318" width="1" height="52" fill="#ffffff" opacity="0.1"/>

  <!-- Stat 3 -->
  <text x="962" y="340" font-size="34" fill="#ffffff" font-weight="800" letter-spacing="-1">0</text>
  <text x="962" y="362" font-size="11" fill="#ffffff" opacity="0.3" font-weight="400" letter-spacing="0.1em">INSTALLS</text>

  <!-- Difficulty pills -->
  <!-- Easy -->
  <rect x="680" y="390" width="74" height="26" rx="13" fill="#28c864" fill-opacity="0.12"/>
  <rect x="680" y="390" width="74" height="26" rx="13" fill="none" stroke="#28c864" stroke-width="0.8" opacity="0.4"/>
  <text x="717" y="407" font-size="11" fill="#28c864" font-weight="700" text-anchor="middle" letter-spacing="0.06em">EASY</text>

  <!-- Medium -->
  <rect x="764" y="390" width="86" height="26" rx="13" fill="#ffbe32" fill-opacity="0.12"/>
  <rect x="764" y="390" width="86" height="26" rx="13" fill="none" stroke="#ffbe32" stroke-width="0.8" opacity="0.4"/>
  <text x="807" y="407" font-size="11" fill="#ffbe32" font-weight="700" text-anchor="middle" letter-spacing="0.06em">MEDIUM</text>

  <!-- Hard -->
  <rect x="860" y="390" width="68" height="26" rx="13" fill="#ff6450" fill-opacity="0.12"/>
  <rect x="860" y="390" width="68" height="26" rx="13" fill="none" stroke="#ff6450" stroke-width="0.8" opacity="0.4"/>
  <text x="894" y="407" font-size="11" fill="#ff6450" font-weight="700" text-anchor="middle" letter-spacing="0.06em">HARD</text>

  <!-- Expert -->
  <rect x="938" y="390" width="80" height="26" rx="13" fill="#c864ff" fill-opacity="0.12"/>
  <rect x="938" y="390" width="80" height="26" rx="13" fill="none" stroke="#c864ff" stroke-width="0.8" opacity="0.4"/>
  <text x="978" y="407" font-size="11" fill="#c864ff" font-weight="700" text-anchor="middle" letter-spacing="0.06em">EXPERT</text>

  <!-- Feature list -->
  <rect x="680" y="444" width="6" height="6" rx="1" fill="#00e87a" opacity="0.7"/>
  <text x="696" y="453" font-size="13" fill="#ffffff" opacity="0.45" font-weight="400">In-browser Python 3 via Pyodide</text>

  <rect x="680" y="470" width="6" height="6" rx="1" fill="#00e87a" opacity="0.7"/>
  <text x="696" y="479" font-size="13" fill="#ffffff" opacity="0.45" font-weight="400">CodeMirror editor with syntax highlighting</text>

  <rect x="680" y="496" width="6" height="6" rx="1" fill="#00e87a" opacity="0.7"/>
  <text x="696" y="505" font-size="13" fill="#ffffff" opacity="0.45" font-weight="400">Leaderboard, streaks, and progress tracking</text>

  <!-- Vertical divider between panels -->
  <rect x="640" y="80" width="1" height="470" fill="#ffffff" opacity="0.06"/>

  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="#00e87a" opacity="0.2"/>
</svg>
