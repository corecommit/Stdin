  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="#00e87a" opacity="0.9"/>

  <!-- ═══════════════════════════════
       LEFT — Code editor + terminal
       Card: x=60 w=500 right=560
       Line numbers: x=88 text-anchor=end
       Indent L0=116  L1=134  L2=152  L3=170
       (each level = 18px ≈ ~2.3 chars at 13px mono)
       Rows spaced 24px apart, first at y=138
       ═══════════════════════════════ -->

  <!-- Card shell -->
  <rect x="60" y="60" width="500" height="450" rx="10" fill="#111520" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- Window chrome -->
  <rect x="60" y="60" width="500" height="44" rx="10" fill="#0e1219"/>
  <rect x="60" y="94" width="500" height="10" fill="#0e1219"/>

  <!-- Traffic lights -->
  <circle cx="92"  cy="82" r="5.5" fill="#ff5f57"/>
  <circle cx="112" cy="82" r="5.5" fill="#febc2e"/>
  <circle cx="132" cy="82" r="5.5" fill="#28c840"/>

  <!-- Filename tab -->
  <text x="152" y="87" font-size="12" fill="#ffffff" opacity="0.3" font-weight="400">solution.py</text>

  <!-- ── Code: row y=138, step 24 ──
       L0=116  L1=134  L2=152  L3=170
       char width at 13px mono ≈ 7.8px
  -->

  <!-- 1: def two_sum(nums, target): -->
  <text x="88" y="138" font-size="13" fill="#ffffff" opacity="0.18" font-weight="400" text-anchor="end">1</text>
  <text x="116" y="138" font-size="13" fill="#c792ea" font-weight="400">def</text>
  <text x="140" y="138" font-size="13" fill="#82aaff"  font-weight="400">two_sum</text>
  <text x="202" y="138" font-size="13" fill="#ffffff"  font-weight="400">(</text>
  <text x="210" y="138" font-size="13" fill="#ffcb6b"  font-weight="400">nums</text>
  <text x="241" y="138" font-size="13" fill="#ffffff"  font-weight="400">,</text>
  <text x="250" y="138" font-size="13" fill="#ffcb6b"  font-weight="400">target</text>
  <text x="297" y="138" font-size="13" fill="#ffffff"  font-weight="400">):</text>

  <!-- 2:     # track seen numbers -->
  <text x="88" y="162" font-size="13" fill="#ffffff" opacity="0.18" font-weight="400" text-anchor="end">2</text>
  <text x="134" y="162" font-size="13" fill="#546e7a" font-weight="400" font-style="italic"># track seen numbers</text>

  <!-- 3:     seen = {} -->
  <text x="88" y="186" font-size="13" fill="#ffffff" opacity="0.18" font-weight="400" text-anchor="end">3</text>
  <text x="134" y="186" font-size="13" fill="#82aaff" font-weight="400">seen</text>
  <text x="165" y="186" font-size="13" fill="#89ddff" font-weight="400">=</text>
  <text x="176" y="186" font-size="13" fill="#ffffff"  font-weight="400">{}</text>

  <!-- 4:     for i, n in enumerate(nums): -->
  <text x="88" y="210" font-size="13" fill="#ffffff" opacity="0.18" font-weight="400" text-anchor="end">4</text>
  <text x="134" y="210" font-size="13" fill="#c792ea" font-weight="400">for</text>
  <text x="158" y="210" font-size="13" fill="#ffcb6b"  font-weight="400">i</text>
  <text x="165" y="210" font-size="13" fill="#ffffff"  font-weight="400">,</text>
  <text x="173" y="210" font-size="13" fill="#ffcb6b"  font-weight="400">n</text>
  <text x="181" y="210" font-size="13" fill="#c792ea"  font-weight="400">in</text>
  <text x="199" y="210" font-size="13" fill="#82aaff"  font-weight="400">enumerate</text>
  <text x="269" y="210" font-size="13" fill="#ffffff"  font-weight="400">(</text>
  <text x="277" y="210" font-size="13" fill="#ffcb6b"  font-weight="400">nums</text>
  <text x="308" y="210" font-size="13" fill="#ffffff"  font-weight="400">):</text>

  <!-- 5:         if target - n in seen: -->
  <text x="88" y="234" font-size="13" fill="#ffffff" opacity="0.18" font-weight="400" text-anchor="end">5</text>
  <text x="152" y="234" font-size="13" fill="#c792ea" font-weight="400">if</text>
  <text x="168" y="234" font-size="13" fill="#ffcb6b"  font-weight="400">target</text>
  <text x="215" y="234" font-size="13" fill="#89ddff"  font-weight="400">-</text>
  <text x="225" y="234" font-size="13" fill="#ffcb6b"  font-weight="400">n</text>
  <text x="233" y="234" font-size="13" fill="#c792ea"  font-weight="400">in</text>
  <text x="251" y="234" font-size="13" fill="#82aaff"  font-weight="400">seen</text>
  <text x="282" y="234" font-size="13" fill="#ffffff"  font-weight="400">:</text>

  <!-- 6:             return [seen[target - n], i] -->
  <text x="88" y="258" font-size="13" fill="#ffffff" opacity="0.18" font-weight="400" text-anchor="end">6</text>
  <text x="170" y="258" font-size="13" fill="#c792ea" font-weight="400">return</text>
  <text x="217" y="258" font-size="13" fill="#ffffff"  font-weight="400">[</text>
  <text x="224" y="258" font-size="13" fill="#82aaff"  font-weight="400">seen</text>
  <text x="255" y="258" font-size="13" fill="#ffffff"  font-weight="400">[</text>
  <text x="263" y="258" font-size="13" fill="#ffcb6b"  font-weight="400">target</text>
  <text x="310" y="258" font-size="13" fill="#89ddff"  font-weight="400">-</text>
  <text x="321" y="258" font-size="13" fill="#ffcb6b"  font-weight="400">n</text>
  <text x="329" y="258" font-size="13" fill="#ffffff"  font-weight="400">],</text>
  <text x="345" y="258" font-size="13" fill="#f78c6c"  font-weight="400">i</text>
  <text x="353" y="258" font-size="13" fill="#ffffff"  font-weight="400">]</text>

  <!-- 7:         seen[n] = i -->
  <text x="88" y="282" font-size="13" fill="#ffffff" opacity="0.18" font-weight="400" text-anchor="end">7</text>
  <text x="152" y="282" font-size="13" fill="#82aaff" font-weight="400">seen</text>
  <text x="183" y="282" font-size="13" fill="#ffffff"  font-weight="400">[</text>
  <text x="190" y="282" font-size="13" fill="#ffcb6b"  font-weight="400">n</text>
  <text x="198" y="282" font-size="13" fill="#ffffff"  font-weight="400">]</text>
  <text x="206" y="282" font-size="13" fill="#89ddff"  font-weight="400">=</text>
  <text x="218" y="282" font-size="13" fill="#f78c6c"  font-weight="400">i</text>

  <!-- 8: cursor -->
  <text x="88" y="306" font-size="13" fill="#ffffff" opacity="0.18" font-weight="400" text-anchor="end">8</text>
  <rect x="116" y="292" width="2" height="16" fill="#00e87a"/>

